<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>三扇门大冒险 | ThreeDoors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <!-- 开始界面：视频 + 点击任意处开始 -->
  <div id="start-screen">
    <video id="opening-video" playsinline preload="auto" muted autoplay>
      <source src="{{ url_for('static', filename='video/opening.mp4') }}" type="video/mp4">
    </video>
    <div id="start-screen-overlay">
      <h1 id="start-title">三扇门大冒险</h1>
      <p id="start-subtitle">ThreeDoors</p>
      <p id="start-hint">点击任意处开始</p>
    </div>
  </div>

  <!-- 游戏主内容 -->
  <div id="game-container" style="display: none;">
  <div class="container">
    <h1>三扇门大冒险</h1>
    <div id="scene-area">
      <div id="scene-emoji">🚪</div>
    </div>

    <div id="status-area">
      <!-- Removed HP bar container -->
      <div id="other-stats">ATK: 5 | Gold: 0 | Round: 0</div>
    </div>

    <div id="door-area" style="display: none;">
      <!-- Door cards will be injected here by JS -->
    </div>
    <!-- 新增库存显示区域 -->
    <div id="inventory-area">库存：暂无道具</div>
    <div id="buttons">
      <button class="main-btn" id="btn1">选项1</button>
      <button class="main-btn" id="btn2">选项2</button>
      <button class="main-btn" id="btn3">选项3</button>
    </div>
    <div id="log-area">日志区域</div>
    <div style="margin-top:10px;">
      <button id="startOverBtn">重置游戏</button>
      <button id="soundToggleBtn">音效：开</button>
      <button id="exitGameBtn">关闭游戏</button>
    </div>
  </div>
  </div>
  <script>window.TEST_GATE = {{ (test_gate or '')|tojson }};</script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
